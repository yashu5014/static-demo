i<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 Static Website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 60%;
        }

        h1 {
            color: #232f3e;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 20px;
        }

        button {
            background: #ff9900;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #e68a00;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to AWS S3 Static Website</h1>

        <p>
            This website is hosted on Amazon S3 and deployed using GitHub Actions.
        </p>

        <p class="success">
            CI/CD Pipeline Working Successfully
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Website deployed successfully using GitHub Actions!";
        }
    </script>

</body>
</html>
