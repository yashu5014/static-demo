<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S3 Static Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.8;
      color: #cbd5e1;
    }

    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 18px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 999px;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 S3 Static Website</h1>

    <p>
      Your Amazon S3 bucket static website hosting is working successfully.
    </p>

    <div class="badge">
      Hosted on AWS S3
    </div>

    <footer>
      index.html deployed successfully
    </footer>
  </div>
</body>
</html>
